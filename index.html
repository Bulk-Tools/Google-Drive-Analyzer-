<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drive Tree Analyzer</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        :root { --primary: #1a73e8; --bg: #f8f9fa; --text: #202124; --muted: #5f6368; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; padding: 20px; max-width: 1000px; margin: 0 auto; background: var(--bg); color: var(--text); }
        .card { background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        button { padding: 10px 15px; background: var(--primary); color: white; border: none; border-radius: 5px; cursor: pointer; display: inline-flex; align-items: center; gap: 5px; }
        button:hover { opacity: 0.9; }
        #signout_button { background: #d93025; }
        .toolbar { display: flex; gap: 10px; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid #ddd; }
        .secondary { background: white; color: var(--text); border: 1px solid #ddd; }
        
        /* Tree UI */
        ul { list-style: none; padding: 0; margin: 0; }
        .tree-children { padding-left: 25px; border-left: 2px dashed #ddd; margin-left: 12px; display: none; }
        .tree-node-content { display: flex; align-items: center; padding: 6px; border-radius: 4px; cursor: pointer; }
        .tree-node-content:hover { background: #e8f0fe; }
        .icon { font-size: 20px; margin-right: 8px; color: var(--muted); }
        .folder-icon { color: #fbbc04; }
        .pdf-icon { color: #d93025; }
        .name { flex-grow: 1; font-size: 14px; }
        .folder-name { font-weight: 600; color: #1a237e; }
        .size { font-size: 12px; color: var(--muted); background: var(--bg); padding: 2px 6px; border-radius: 10px; }
        
        /* Actions */
        .actions { display: none; gap: 5px; margin-left: 10px; }
        .tree-node-content:hover .actions { display: flex; }
        .action-btn { font-size: 16px; color: var(--primary); padding: 4px; border-radius: 50%; }
        .action-btn:hover { background: #d2e3fc; }
        
        #status { font-weight: 500; color: var(--primary); margin-bottom: 15px; }
        .spin { animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Bulk Rename Styles */
        .search-box { display: flex; gap: 10px; margin-bottom: 15px; align-items: center; }
        .search-box input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 5px; font-size: 14px; }
        .results-container { max-height: 400px; overflow-y: auto; border: 1px solid #ddd; border-radius: 5px; margin-bottom: 15px; }
        .result-item { display: flex; align-items: center; padding: 10px; border-bottom: 1px solid #f0f0f0; }
        .result-item:hover { background: #f8f9fa; }
        .result-checkbox { margin-right: 10px; }
        .result-name { flex: 1; font-size: 14px; }
        .result-new-name { color: var(--primary); font-weight: 500; }
        .result-icon { margin-right: 8px; font-size: 20px; color: var(--muted); }
        .bulk-actions { display: flex; gap: 10px; margin-top: 10px; }
        .stats { font-size: 13px; color: var(--muted); margin-bottom: 10px; }

        /* Progress Bar Styles */
        .progress-container { margin: 15px 0; display: none; }
        .progress-header { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 14px; font-weight: 500; }
        .progress-bar-bg { background: #e0e0e0; border-radius: 10px; height: 24px; overflow: hidden; position: relative; }
        .progress-bar-fill { background: linear-gradient(90deg, var(--primary) 0%, #4285f4 100%); height: 100%; transition: width 0.3s ease; display: flex; align-items: center; justify-content: center; color: white; font-size: 12px; font-weight: 600; min-width: 0; }
        .processed-files { margin-top: 15px; max-height: 200px; overflow-y: auto; border: 1px solid #e0e0e0; border-radius: 5px; padding: 10px; background: #f8f9fa; }
        .processed-files-title { font-weight: 600; color: var(--text); margin-bottom: 8px; font-size: 13px; }
        .processed-file-item { padding: 5px 0; font-size: 12px; color: var(--muted); border-bottom: 1px solid #e8e8e8; }
        .processed-file-item:last-child { border-bottom: none; }
        .processed-file-item.success { color: #34a853; }
        .processed-file-item.error { color: #d93025; }
        .processed-file-item.skipped { color: #f9ab00; }
    </style>
</head>
<body>

    <div class="card" id="auth-section">
        <h2 style="color: var(--primary); margin-top: 0;"><span class="material-icons">account_tree</span> Drive Analyzer</h2>
        <button id="authorize_button" onclick="handleAuthClick()" style="display: none;">Log In to Drive</button>
        <button id="signout_button" onclick="handleSignoutClick()" style="display: none;">Sign Out</button>
    </div>

    <div class="card" id="rename-section" style="display: none;">
        <h3 style="color: var(--primary); margin-top: 0;"><span class="material-icons" style="vertical-align: middle;">drive_file_rename_outline</span> Bulk Rename Files</h3>

        <div class="search-box">
            <input type="text" id="search-prefix" placeholder='Enter prefix to search (e.g., "Copy of")' value="Copy of">
            <button onclick="searchFilesWithPrefix()"><span class="material-icons">search</span> Search Files</button>
        </div>

        <div id="rename-status"></div>

        <!-- Progress Bar Container -->
        <div class="progress-container" id="progress-container">
            <div class="progress-header">
                <span id="progress-text">Processing files...</span>
                <span id="progress-count">0 / 0</span>
            </div>
            <div class="progress-bar-bg">
                <div class="progress-bar-fill" id="progress-bar-fill" style="width: 0%;">
                    <span id="progress-percentage">0%</span>
                </div>
            </div>
            <div style="margin-top: 10px;">
                <button id="stop-button" onclick="stopRenameProcess()" style="background: #d93025;">
                    <span class="material-icons">stop</span> Stop Process
                </button>
            </div>
            <div class="processed-files" id="processed-files">
                <div class="processed-files-title">Processed Files:</div>
                <div id="processed-files-list"></div>
            </div>
        </div>

        <div id="results-section" style="display: none;">
            <div class="stats">
                <span id="results-count">0 files found</span>
                <label style="margin-left: 20px;">
                    <input type="checkbox" id="select-all" onchange="toggleSelectAll(this)"> Select All
                </label>
            </div>

            <div class="results-container" id="results-list"></div>

            <div class="bulk-actions">
                <button onclick="removePrefix()"><span class="material-icons">edit</span> Remove Prefix from Selected</button>
                <button class="secondary" onclick="previewRename()"><span class="material-icons">visibility</span> Preview Changes</button>
            </div>
        </div>
    </div>

    <div class="card" id="data-section" style="display: none;">
        <button onclick="fetchDriveFiles()"><span class="material-icons">sync</span> Analyze Drive</button>
        <div id="status" style="margin-top: 15px;"></div>

        <div id="tools" style="display: none;">
            <div class="toolbar">
                <button class="secondary" onclick="toggleAll('block')"><span class="material-icons">unfold_more</span> Expand All</button>
                <button class="secondary" onclick="toggleAll('none')"><span class="material-icons">unfold_less</span> Collapse All</button>
                <div style="flex-grow: 1;"></div>
                <button onclick="exportToPDF('tree-container', 'Full_Drive_Tree')"><span class="material-icons">picture_as_pdf</span> Export PDF</button>
                <button onclick="exportToTXT(treeData, 'Full_Drive_Tree')"><span class="material-icons">description</span> Export TXT</button>
            </div>
            <div id="tree-container"></div>
        </div>
    </div>

    <script src="https://apis.google.com/js/api.js"></script>
    <script src="https://accounts.google.com/gsi/client"></script>
    
    <script>
        const CLIENT_ID = '1082194279992-76lg6issm569spcojof6n1ei0g60qnij.apps.googleusercontent.com';
        let tokenClient, treeData = null, allFiles = [];

        // --- AUTHENTICATION ---
        gapi.load('client', async () => {
            await gapi.client.init({ discoveryDocs: ['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest'] });
            document.getElementById('authorize_button').style.display = 'inline-flex';
        });

        window.onload = () => {
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID, scope: 'https://www.googleapis.com/auth/drive.file',
                callback: (resp) => {
                    if (resp.error) return;
                    document.getElementById('auth-section').style.display = 'none';
                    document.getElementById('data-section').style.display = 'block';
                    document.getElementById('rename-section').style.display = 'block';
                    document.getElementById('signout_button').style.display = 'inline-flex';
                }
            });
        };

        function handleAuthClick() { tokenClient.requestAccessToken({ prompt: gapi.client.getToken() ? '' : 'consent' }); }
        function handleSignoutClick() {
            google.accounts.oauth2.revoke(gapi.client.getToken().access_token);
            gapi.client.setToken('');
            location.reload();
        }

        // --- FETCH & BUILD ---
        async function fetchDriveFiles() {
            const status = document.getElementById('status');
            document.getElementById('tools').style.display = 'none';
            status.innerHTML = '<span class="material-icons spin">autorenew</span> Scanning...';

            let files = [], pageToken = null;
            try {
                do {
                    const res = await gapi.client.drive.files.list({ pageSize: 1000, fields: 'nextPageToken, files(id, name, mimeType, parents, size)', pageToken: pageToken || '' });
                    files = files.concat(res.result.files || []);
                    pageToken = res.result.nextPageToken;
                } while (pageToken);

                allFiles = files; // Store for bulk rename
                status.innerHTML = `<span class="material-icons">check_circle</span> Mapped ${files.length} items.`;
                treeData = buildTree(files);
                renderTree(treeData, document.getElementById('tree-container'));
                document.getElementById('tools').style.display = 'block';
            } catch (err) { status.innerText = `Error: ${err.message}`; }
        }

        function buildTree(files) {
            let map = {}, root = { id: 'root', name: 'My Drive', mimeType: 'application/vnd.google-apps.folder', children: [] };
            files.forEach(f => map[f.id] = { ...f, children: [] });
            files.forEach(f => {
                if (!f.parents) root.children.push(map[f.id]);
                else if (map[f.parents[0]]) map[f.parents[0]].children.push(map[f.id]);
                else root.children.push(map[f.id]);
            });
            return root;
        }

        // --- UI & RENDER ---
        function toggleAll(display) {
            document.querySelectorAll('.tree-children').forEach(el => el.style.display = display);
            document.querySelectorAll('.toggle-icon').forEach(el => el.textContent = display === 'block' ? 'arrow_drop_down' : 'arrow_right');
        }

        function toggleNode(e, el) {
            e.stopPropagation();
            let childUl = el.closest('li').querySelector(':scope > ul');
            if (!childUl) return;
            const isHidden = childUl.style.display === 'none';
            childUl.style.display = isHidden ? 'block' : 'none';
            el.textContent = isHidden ? 'arrow_drop_down' : 'arrow_right';
        }

        function renderTree(node, container, isRoot = true) {
            const isFolder = node.mimeType === 'application/vnd.google-apps.folder';
            let li = document.createElement('li');
            
            let content = `<div class="tree-node-content">
                <span class="material-icons toggle-icon icon" onclick="toggleNode(event, this)">${isFolder && node.children.length ? 'arrow_right' : ''}</span>
                <span class="material-icons icon ${isFolder ? 'folder-icon' : (node.mimeType.includes('pdf') ? 'pdf-icon' : '')}">${isFolder ? 'folder' : 'description'}</span>
                <span class="name ${isFolder ? 'folder-name' : ''}">${node.name}</span>
                ${node.size && !isFolder ? `<span class="size">${(node.size/1024/1024).toFixed(2)} MB</span>` : ''}
            </div>`;
            li.innerHTML = content;

            if (isFolder && !isRoot) {
                let actions = document.createElement('div');
                actions.className = 'actions';
                actions.innerHTML = `<span class="material-icons action-btn" title="PDF" onclick="event.stopPropagation(); exportFolder(this, '${node.name}')">picture_as_pdf</span>`;
                li.querySelector('.tree-node-content').appendChild(actions);
            }

            if (node.children && node.children.length) {
                let ul = document.createElement('ul');
                ul.className = 'tree-children';
                if (isRoot) ul.style.display = 'block';
                
                node.children.sort((a,b) => (b.mimeType.includes('folder') ? 1 : 0) - (a.mimeType.includes('folder') ? 1 : 0) || a.name.localeCompare(b.name))
                             .forEach(child => ul.appendChild(renderTree(child, null, false)));
                li.appendChild(ul);
            }

            if (container) { container.innerHTML = ''; let rootUl = document.createElement('ul'); rootUl.appendChild(li); container.appendChild(rootUl); }
            return li;
        }

        // --- EXPORTS ---
        function exportToPDF(elementId, filename) {
            toggleAll('block'); // Expand everything
            const el = document.getElementById(elementId).cloneNode(true);
            el.querySelectorAll('.actions').forEach(a => a.remove()); // Clean UI
            html2pdf().set({ margin: 10, filename: filename+'.pdf', jsPDF: { format: 'a4' } }).from(el).save();
        }

        function exportFolder(btn, name) {
            let clone = btn.closest('li').cloneNode(true);
            clone.querySelectorAll('.tree-children').forEach(el => el.style.display = 'block');
            clone.querySelectorAll('.actions').forEach(el => el.remove());
            html2pdf().set({ margin: 10, filename: name+'.pdf', jsPDF: { format: 'a4' } }).from(clone).save();
        }

        function exportToTXT(node) {
            let txt = `${node.name}\n`;
            function buildTxt(n, prefix = '', isLast = true) {
                if (!n.children) return '';
                let res = '';
                n.children.forEach((c, i) => {
                    let last = i === n.children.length - 1;
                    res += prefix + (last ? '└── ' : '├── ') + c.name + '\n' + buildTxt(c, prefix + (last ? '    ' : '│   '), last);
                });
                return res;
            }
            const blob = new Blob([txt + buildTxt(node)], { type: 'text/plain' });
            const link = document.createElement('a'); link.href = URL.createObjectURL(blob); link.download = 'Drive_Tree.txt'; link.click();
        }

        // --- BULK RENAME FUNCTIONS ---
        let searchResults = [];
        let shouldStopRenaming = false;

        function searchFilesWithPrefix() {
            const prefix = document.getElementById('search-prefix').value.trim();
            const statusEl = document.getElementById('rename-status');

            if (!prefix) {
                statusEl.innerHTML = '<span style="color: #d93025;">Please enter a prefix to search</span>';
                return;
            }

            if (!allFiles.length) {
                statusEl.innerHTML = '<span style="color: #d93025;">Please analyze your Drive first</span>';
                return;
            }

            statusEl.innerHTML = '<span class="material-icons spin">search</span> Searching...';

            // Search for files starting with the prefix
            searchResults = allFiles.filter(file => file.name.startsWith(prefix));

            if (searchResults.length === 0) {
                statusEl.innerHTML = `<span style="color: var(--muted);">No files found starting with "${prefix}"</span>`;
                document.getElementById('results-section').style.display = 'none';
                return;
            }

            // Display results
            displaySearchResults(prefix);
            statusEl.innerHTML = '';
            document.getElementById('results-section').style.display = 'block';
        }

        function displaySearchResults(prefix) {
            const resultsContainer = document.getElementById('results-list');
            const countEl = document.getElementById('results-count');

            countEl.textContent = `${searchResults.length} file(s) found`;
            resultsContainer.innerHTML = '';

            searchResults.forEach((file, index) => {
                const isFolder = file.mimeType === 'application/vnd.google-apps.folder';
                const newName = file.name.substring(prefix.length).trim();

                const item = document.createElement('div');
                item.className = 'result-item';
                item.innerHTML = `
                    <input type="checkbox" class="result-checkbox" data-index="${index}" checked>
                    <span class="material-icons result-icon ${isFolder ? 'folder-icon' : ''}">${isFolder ? 'folder' : 'description'}</span>
                    <div class="result-name">
                        <div><strong>Current:</strong> ${file.name}</div>
                        <div class="result-new-name"><strong>New:</strong> ${newName || '(empty - will skip)'}</div>
                    </div>
                `;
                resultsContainer.appendChild(item);
            });

            document.getElementById('select-all').checked = true;
        }

        function toggleSelectAll(checkbox) {
            document.querySelectorAll('.result-checkbox').forEach(cb => cb.checked = checkbox.checked);
        }

        function previewRename() {
            const prefix = document.getElementById('search-prefix').value.trim();
            const selected = getSelectedFiles();

            if (selected.length === 0) {
                alert('Please select at least one file to rename');
                return;
            }

            let preview = `You are about to rename ${selected.length} file(s):\n\n`;
            selected.forEach(file => {
                const newName = file.name.substring(prefix.length).trim();
                if (newName) {
                    preview += `"${file.name}" → "${newName}"\n`;
                }
            });

            alert(preview);
        }

        function getSelectedFiles() {
            const checkboxes = document.querySelectorAll('.result-checkbox:checked');
            return Array.from(checkboxes).map(cb => searchResults[parseInt(cb.dataset.index)]);
        }

        function stopRenameProcess() {
            shouldStopRenaming = true;
            document.getElementById('stop-button').disabled = true;
            document.getElementById('stop-button').innerHTML = '<span class="material-icons">stop</span> Stopping...';
        }

        async function removePrefix() {
            const prefix = document.getElementById('search-prefix').value.trim();
            const selected = getSelectedFiles();

            if (selected.length === 0) {
                alert('Please select at least one file to rename');
                return;
            }

            if (!confirm(`Are you sure you want to remove "${prefix}" from ${selected.length} file(s)?`)) {
                return;
            }

            // Reset stop flag
            shouldStopRenaming = false;

            const statusEl = document.getElementById('rename-status');
            const progressContainer = document.getElementById('progress-container');
            const progressBar = document.getElementById('progress-bar-fill');
            const progressText = document.getElementById('progress-text');
            const progressCount = document.getElementById('progress-count');
            const progressPercentage = document.getElementById('progress-percentage');
            const processedFilesList = document.getElementById('processed-files-list');
            const stopButton = document.getElementById('stop-button');

            // Show progress bar and hide results section during processing
            progressContainer.style.display = 'block';
            document.getElementById('results-section').style.display = 'none';
            statusEl.innerHTML = '';
            processedFilesList.innerHTML = '';
            stopButton.disabled = false;
            stopButton.innerHTML = '<span class="material-icons">stop</span> Stop Process';

            let successful = 0, failed = 0, skipped = 0;
            const errors = [];
            const processedFiles = [];

            for (let i = 0; i < selected.length; i++) {
                // Check if user requested to stop
                if (shouldStopRenaming) {
                    progressText.textContent = 'Process stopped by user';
                    const stopMsg = document.createElement('div');
                    stopMsg.className = 'processed-file-item skipped';
                    stopMsg.textContent = `⚠️ Process stopped. Remaining ${selected.length - i} file(s) were not processed.`;
                    processedFilesList.appendChild(stopMsg);
                    break;
                }

                const file = selected[i];
                const newName = file.name.substring(prefix.length).trim();
                const currentProgress = i + 1;
                const percentage = Math.round((currentProgress / selected.length) * 100);

                // Update progress bar
                progressBar.style.width = percentage + '%';
                progressPercentage.textContent = percentage + '%';
                progressCount.textContent = `${currentProgress} / ${selected.length}`;
                progressText.textContent = 'Processing files...';

                let status = 'error';
                let displayMessage = '';

                if (!newName) {
                    skipped++;
                    status = 'skipped';
                    displayMessage = `⚠️ Skipped: "${file.name}" (would result in empty name)`;
                    processedFiles.push({ name: file.name, status, message: displayMessage });
                } else {
                    try {
                        await gapi.client.drive.files.update({
                            fileId: file.id,
                            resource: { name: newName }
                        });
                        successful++;
                        status = 'success';
                        displayMessage = `✓ Renamed: "${file.name}" → "${newName}"`;
                        processedFiles.push({ name: file.name, newName, status, message: displayMessage });
                    } catch (err) {
                        failed++;
                        status = 'error';
                        displayMessage = `✗ Failed: "${file.name}" - ${err.message}`;
                        errors.push(`${file.name}: ${err.message}`);
                        processedFiles.push({ name: file.name, status, message: displayMessage, error: err.message });
                    }
                }

                // Add to processed files list
                const fileItem = document.createElement('div');
                fileItem.className = `processed-file-item ${status}`;
                fileItem.textContent = displayMessage;
                processedFilesList.appendChild(fileItem);

                // Auto-scroll to bottom to show latest processed file
                document.getElementById('processed-files').scrollTop = document.getElementById('processed-files').scrollHeight;
            }

            // Update final status
            if (!shouldStopRenaming) {
                progressText.textContent = 'Processing complete!';
            }

            let resultMsg = shouldStopRenaming
                ? `<span class="material-icons" style="color: #f9ab00;">warning</span> Process stopped. `
                : `<span class="material-icons" style="color: #34a853;">check_circle</span> `;
            resultMsg += `Renamed ${successful} file(s)`;
            if (skipped > 0) resultMsg += `, skipped ${skipped} (would be empty)`;
            if (failed > 0) resultMsg += `, <span style="color: #d93025;">failed ${failed}</span>`;

            statusEl.innerHTML = resultMsg;

            if (errors.length > 0) {
                console.error('Rename errors:', errors);
                statusEl.innerHTML += '<br><span style="color: var(--muted); font-size: 12px;">Check console for detailed error messages</span>';
            }

            // Disable stop button after processing is done
            stopButton.disabled = true;

            // Show results section again after a brief delay
            setTimeout(() => {
                document.getElementById('results-section').style.display = 'block';
            }, 1000);

            // Refresh the drive to reflect changes
            if (successful > 0) {
                setTimeout(() => {
                    statusEl.innerHTML += '<br><span style="color: var(--muted); font-size: 13px;">Refreshing Drive data...</span>';
                    fetchDriveFiles();
                }, 3000);
            }
        }
    </script>
</body>
</html>
